<html>
<body>
<script>
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString();
    }
    document.write("HASH=" + simpleHash("fable2026"));
</script>
</body>
</html>
